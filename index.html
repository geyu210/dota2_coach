<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A browser-based Dota 2 laning reminder timer."
    />
    <title>Dota2 Coach</title>
    <link rel="icon" href="assets/lane-map.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="timer-panel" aria-labelledby="app-title">
        <div class="topbar">
          <div>
            <p class="eyebrow">Dota2 Coach</p>
            <h1 id="app-title">Dota2 提醒计时器</h1>
          </div>
          <button class="icon-button" id="soundButton" type="button" title="浏览器通知">
            <svg aria-hidden="true" viewBox="0 0 24 24" class="button-icon">
              <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
              <path d="M10 21h4" />
            </svg>
            <span class="sr-only">浏览器通知</span>
          </button>
        </div>

        <div class="timer-grid">
          <div class="clock-block" aria-live="polite">
            <span class="clock-label">本局时间</span>
            <strong id="clock">00:00</strong>
          </div>
          <div class="next-block">
            <span class="clock-label">下一提醒</span>
            <strong id="nextTime">00:05</strong>
            <p id="nextMessage">按 Ctrl + F1 编队</p>
          </div>
        </div>

        <div class="progress-wrap" aria-hidden="true">
          <div class="progress-track">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-markers" id="progressMarkers"></div>
        </div>

        <div class="controls" aria-label="计时控制">
          <button class="primary-button" id="startButton" type="button">开始本局</button>
          <button class="secondary-button" id="pauseButton" type="button" disabled>暂停</button>
          <button class="secondary-button" id="resetButton" type="button">重置</button>
          <label class="switch">
            <input id="enabledSwitch" type="checkbox" checked />
            <span>提醒开启</span>
          </label>
        </div>

        <div class="sync-row" aria-label="时间同步">
          <label>
            <span>同步本局时间</span>
            <input id="syncTimeInput" inputmode="numeric" value="00:00" />
          </label>
          <button class="secondary-button" id="syncTimeButton" type="button">同步</button>
        </div>

        <div class="lane-visual" aria-hidden="true">
          <img src="assets/lane-map.svg" alt="" />
        </div>
      </section>

      <section class="settings-panel" aria-labelledby="settings-title">
        <div class="settings-head">
          <div>
            <p class="eyebrow">Schedule</p>
            <h2 id="settings-title">提醒设置</h2>
          </div>
          <button class="ghost-button" id="resetDefaultsButton" type="button">恢复默认</button>
        </div>

        <section class="preset-panel" aria-label="路线预设">
          <div>
            <span class="section-label">路线预设</span>
            <p>一键换成中路或边路提醒表。</p>
          </div>
          <div class="preset-actions">
            <button class="secondary-button" id="midPresetButton" type="button">中路</button>
            <button class="secondary-button" id="sidePresetButton" type="button">边路</button>
          </div>
        </section>

        <form class="editor" id="reminderForm">
          <label>
            <span>时间</span>
            <input id="timeInput" name="time" inputmode="numeric" placeholder="01:30" required />
          </label>
          <label>
            <span>内容</span>
            <input id="messageInput" name="message" maxlength="60" required />
          </label>
          <label>
            <span>语音</span>
            <select id="voiceSelect" name="voice"></select>
          </label>
          <label class="check-row">
            <input id="reminderEnabledInput" name="enabled" type="checkbox" checked />
            <span>启用</span>
          </label>
          <button class="secondary-button" id="saveReminderButton" type="submit">新增</button>
        </form>

        <div class="list-head">
          <span>启用</span>
          <span>时间</span>
          <span>提醒</span>
          <span>语音</span>
          <span></span>
        </div>
        <div class="reminder-list" id="reminderList"></div>

        <section class="tool-panel" aria-labelledby="voice-title">
          <div class="tool-head">
            <div>
              <p class="eyebrow">Voices</p>
              <h3 id="voice-title">语音库</h3>
            </div>
            <button class="secondary-button" id="importVoicesButton" type="button">导入语音</button>
            <input id="voiceFileInput" type="file" accept="audio/*" multiple hidden />
          </div>
          <div class="voice-list" id="voiceList"></div>
        </section>

        <section class="tool-panel" aria-labelledby="config-title">
          <div class="tool-head">
            <div>
              <p class="eyebrow">Config</p>
              <h3 id="config-title">配置</h3>
            </div>
            <div class="tool-actions">
              <button class="ghost-button" id="exportConfigButton" type="button">导出配置</button>
              <button class="ghost-button" id="importConfigButton" type="button">导入配置</button>
              <input id="configFileInput" type="file" accept="application/json,.json" hidden />
            </div>
          </div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="assertive" hidden>
      <div>
        <span class="toast-kicker">提醒</span>
        <strong id="toastMessage"></strong>
      </div>
      <button class="icon-button small" id="dismissToastButton" type="button" title="关闭">
        <span aria-hidden="true">&times;</span>
        <span class="sr-only">关闭</span>
      </button>
    </div>

    <script src="app.js" defer></script>
  </body>
</html>
