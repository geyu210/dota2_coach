<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A browser-based Dota 2 laning reminder timer."
    />
    <title>Dota2 Coach</title>
    <link rel="icon" href="assets/lane-map.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="timer-panel" aria-labelledby="app-title">
        <h1 id="app-title" class="sr-only">Dota2 Coach</h1>

        <div class="home-stack">
          <div class="clock-block primary-clock" aria-live="polite">
            <span class="clock-label">本局时间</span>
            <strong id="clock">00:00</strong>
          </div>

          <section class="home-control-panel route-panel" aria-label="路线预设">
            <span class="section-label">路线</span>
            <div class="preset-actions route-actions">
              <button class="secondary-button" id="midPresetButton" type="button">中路</button>
              <button class="secondary-button" id="sidePresetButton" type="button">边路</button>
            </div>
          </section>

          <div class="controls primary-controls" aria-label="计时控制">
            <button class="primary-button" id="startButton" type="button">开始本局</button>
            <button class="secondary-button" id="pauseButton" type="button" disabled>暂停</button>
            <button class="secondary-button" id="resetButton" type="button">重置</button>
            <label class="switch">
              <input id="enabledSwitch" type="checkbox" checked />
              <span>提醒开启</span>
            </label>
            <button class="icon-button" id="soundButton" type="button" title="浏览器通知">
              <svg aria-hidden="true" viewBox="0 0 24 24" class="button-icon">
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9" />
                <path d="M10 21h4" />
              </svg>
              <span class="sr-only">浏览器通知</span>
            </button>
          </div>

          <div class="sync-panel primary-sync" aria-label="时间同步">
            <div class="sync-head">
              <span>同步本局时间</span>
            </div>
            <div class="sync-pick-row">
              <div class="time-picker">
                <div class="phase-toggle" aria-label="同步时间阶段">
                  <button class="phase-button is-active" id="syncBeforeButton" type="button">赛前</button>
                  <button class="phase-button" id="syncAfterButton" type="button">赛后</button>
                </div>
                <label>
                  <span>分钟</span>
                  <input id="syncMinuteInput" type="number" inputmode="numeric" min="0" max="180" step="1" value="1" />
                </label>
                <label>
                  <span>秒</span>
                  <input id="syncSecondInput" type="number" inputmode="numeric" min="0" max="59" step="1" value="30" />
                </label>
              </div>
              <button class="primary-button sync-action" id="syncTimeButton" type="button">立即同步</button>
            </div>
            <div class="quick-time-grid" aria-label="减少同步时间">
              <button class="chip-button" type="button" data-sync-step="-60">-01:00</button>
              <button class="chip-button" type="button" data-sync-step="-30">-00:30</button>
              <button class="chip-button" type="button" data-sync-step="-15">-00:15</button>
            </div>
            <div class="time-stepper sync-stepper" aria-label="微调同步时间">
              <button class="chip-button" type="button" data-sync-step="30">+30秒</button>
              <button class="chip-button" type="button" data-sync-step="10">+10秒</button>
              <button class="chip-button" type="button" data-sync-step="5">+5秒</button>
            </div>
          </div>
        </div>

        <div class="secondary-status">
          <div class="next-block">
            <span class="clock-label">下一提醒</span>
            <strong id="nextTime">00:05</strong>
            <p id="nextMessage">按 Ctrl + F1 编队</p>
          </div>

          <div class="progress-wrap" aria-hidden="true">
            <div class="progress-track">
              <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="progress-markers" id="progressMarkers"></div>
          </div>
        </div>

        <div class="lane-visual" aria-hidden="true">
          <img src="assets/lane-map.svg" alt="" />
        </div>
      </section>

      <section class="settings-panel" aria-labelledby="settings-title">
        <div class="settings-head">
          <div>
            <p class="eyebrow">Schedule</p>
            <h2 id="settings-title">提醒设置</h2>
          </div>
          <button class="ghost-button" id="resetDefaultsButton" type="button">恢复默认</button>
        </div>

        <form class="editor" id="reminderForm">
          <div class="time-editor">
            <span class="field-label">提醒时间</span>
            <input id="timeInput" name="time" type="hidden" value="00:05" />
            <div class="time-picker compact">
              <div class="phase-toggle" aria-label="提醒时间阶段">
                <button class="phase-button" id="reminderBeforeButton" type="button">赛前</button>
                <button class="phase-button is-active" id="reminderAfterButton" type="button">赛后</button>
              </div>
              <label>
                <span>分钟</span>
                <input id="reminderMinuteInput" type="number" inputmode="numeric" min="0" max="180" step="1" value="0" />
              </label>
              <label>
                <span>秒</span>
                <input id="reminderSecondInput" type="number" inputmode="numeric" min="0" max="59" step="1" value="5" />
              </label>
            </div>
            <div class="quick-time-grid compact" aria-label="常用提醒时间">
              <button class="chip-button" type="button" data-reminder-time="-10">-00:10</button>
              <button class="chip-button" type="button" data-reminder-time="5">00:05</button>
              <button class="chip-button" type="button" data-reminder-time="35">00:35</button>
              <button class="chip-button" type="button" data-reminder-time="110">01:50</button>
              <button class="chip-button" type="button" data-reminder-time="170">02:50</button>
              <button class="chip-button" type="button" data-reminder-time="330">05:30</button>
              <button class="chip-button" type="button" data-reminder-time="410">06:50</button>
              <button class="chip-button" type="button" data-reminder-time="720">12:00</button>
            </div>
            <div class="time-stepper" aria-label="微调提醒时间">
              <button class="chip-button" type="button" data-reminder-step="-10">-10秒</button>
              <button class="chip-button" type="button" data-reminder-step="10">+10秒</button>
              <button class="chip-button" type="button" data-reminder-step="30">+30秒</button>
              <button class="chip-button" type="button" data-reminder-step="60">+1分</button>
            </div>
          </div>
          <label>
            <span>内容</span>
            <input id="messageInput" name="message" maxlength="60" required />
          </label>
          <label>
            <span>语音</span>
            <select id="voiceSelect" name="voice"></select>
          </label>
          <label class="check-row">
            <input id="reminderEnabledInput" name="enabled" type="checkbox" checked />
            <span>启用</span>
          </label>
          <button class="secondary-button" id="saveReminderButton" type="submit">新增</button>
        </form>

        <div class="list-head">
          <span>启用</span>
          <span>时间</span>
          <span>提醒</span>
          <span>语音</span>
          <span></span>
        </div>
        <div class="reminder-list" id="reminderList"></div>

        <section class="tool-panel" aria-labelledby="voice-title">
          <div class="tool-head">
            <div>
              <p class="eyebrow">Voices</p>
              <h3 id="voice-title">语音库</h3>
            </div>
            <button class="secondary-button" id="importVoicesButton" type="button">导入语音</button>
            <input id="voiceFileInput" type="file" accept="audio/*" multiple hidden />
          </div>
          <div class="voice-list" id="voiceList"></div>
        </section>

        <section class="tool-panel" aria-labelledby="config-title">
          <div class="tool-head">
            <div>
              <p class="eyebrow">Config</p>
              <h3 id="config-title">配置</h3>
            </div>
            <div class="tool-actions">
              <button class="ghost-button" id="exportConfigButton" type="button">导出配置</button>
              <button class="ghost-button" id="importConfigButton" type="button">导入配置</button>
              <input id="configFileInput" type="file" accept="application/json,.json" hidden />
            </div>
          </div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast" role="status" aria-live="assertive" hidden>
      <div>
        <span class="toast-kicker">提醒</span>
        <strong id="toastMessage"></strong>
      </div>
      <button class="icon-button small" id="dismissToastButton" type="button" title="关闭">
        <span aria-hidden="true">&times;</span>
        <span class="sr-only">关闭</span>
      </button>
    </div>

    <script src="app.js?v=11" defer></script>
  </body>
</html>
